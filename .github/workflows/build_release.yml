name: "Release Build and Publish"

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-edc[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/re4de/dataspace-issuer

jobs:
  Release:
    name: "Test, Build and Publish Docker Release image"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          chmod +x ./gradlew
      - name: Test
        run: ./gradlew -p ./runtimes/issuer test
      - name: Docker Build
        run: docker build -t $IMAGE_NAME:${{ github.ref_name }} -f ./runtimes/issuer/src/main/docker/Dockerfile .
      - name: Docker Push
        run: docker push $IMAGE_NAME:${{ github.ref_name }}