apiVersion: v2
name: dataspace-issuer
description: |
  A Helm chart for the data space issuer based on the identity hub.
  The Dataspace issuer can issuance MembershipCredentials and MarketPartnerCredentials.

type: application
version: 1.1.0
appVersion: 1.1.0-edc0.14.0

dependencies:
  - name: postgres
    version: 0.19.0
    repository: oci://registry-1.docker.io/cloudpirates
    condition: install.postgres